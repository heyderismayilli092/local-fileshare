<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pardus Dosya Paylaşımı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface-2: #1c1c1f;
      --surface-3: #232326;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-faint: #555;
      --accent: #4f8ef7;
      --accent-dim: rgba(79,142,247,0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 56px;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .topbar-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px;
      font-family: 'DM Mono', monospace;
    }

    /* ── Page Content ── */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* ── Upload Section ── */
    .upload-section { margin-bottom: 2.5rem; }

    .drop-zone {
      border: 1.5px solid var(--border-hover);
      border-radius: var(--radius);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      width: 48px;
      height: 48px;
      background: var(--surface-2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      border: 1px solid var(--border);
    }

    .drop-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.8;
    }

    .drop-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 5px;
    }

    .drop-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      position: relative;
      z-index: 1;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-upload:hover { opacity: 0.88; }
    .btn-upload:active { transform: scale(0.97); }
    .btn-upload svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2; }

    /* ── Progress ── */
    .progress-bar-wrap {
      margin-top: 1rem;
      display: none;
    }

    .progress-bar-wrap.visible { display: block; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-family: 'DM Mono', monospace;
    }

    .progress-track {
      height: 4px;
      background: var(--surface-3);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.2s ease;
    }

    /* ── File List ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .list-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    /* card */
    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .file-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-2);
    }

    .file-card:active { transform: scale(0.97); }

    .file-thumb {
      width: 60px;
      height: 60px;
      position: relative;
    }

    .file-thumb img {
      width: 55px;
      height: 55px;
    }

    .file-name {
      font-size: 12px;
      color: var(--text);
      text-align: center;
      word-break: break-all;
      line-height: 1.45;
      max-width: 100%;
    }

    .file-size {
      font-size: 11px;
      color: var(--text-faint);
      font-family: 'DM Mono', monospace;
    }

    /* empty */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-faint);
    }

    .empty-state svg {
      width: 42px;
      height: 42px;
      fill: none;
      stroke: var(--surface-3);
      stroke-width: 1.2;
      display: block;
      margin: 0 auto 12px;
    }

    #kullanici {
      font-size: 15px;
      font-family: sans-serif;
    }

    .cizgi {
      size: 2px;
      color: var(--accent);
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .empty-state p { font-size: 14px; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .topbar { padding: 0 1rem; }
      .page { padding: 1.25rem 1rem 3rem; }
      .drop-zone { padding: 2rem 1rem; }
      .file-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <img src="/icon/pardus.png" width="40" height="40"></img>
      </div>
      <span class="topbar-title">Pardus Dosya Paylaşımı</span>
    </div>
  </header>

  <main class="page">

    <!-- Upload -->
    <section class="upload-section">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple>
        <div class="drop-icon">
          <svg viewBox="0 0 24 24">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
          </svg>
        </div>
        <p class="drop-title">Dosyaları buraya sürükle</p>
        <p class="drop-sub">ya da cihazından seç</p>
        <button class="btn-upload" type="button" onclick="document.getElementById('fileInput').click(); event.stopPropagation();">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Dosya Seç
        </button>
      </div>
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-meta">
          <span id="progressName">Yükleniyor...</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </section>

    <!-- File list -->
    <h3 id="kullanici">Paylaşan Kullanıcı: <b style="color: #4f8ef7">{{compuser}}</b></h3>
    <hr class="cizgi"></hr>
    <div class="list-header">
      <span class="list-label">Paylaşılan Dosyalar</span>
    </div>
    <div class="file-grid" id="fileGrid">
      <div class="empty-state">
        <img src="/icon/folder.png"></img>
        <p>Henüz dosya yok</p>
      </div>
    </div>

  </main>

  <script>

    function getExt(name) { return (name.split('.').pop() || '').toLowerCase(); }
    function getLabel(name) {
      const ext = getExt(name);
      return ext.length > 4 ? ext.slice(0,4) : ext || 'unknown';
    }


    function fmtSize(b) {
      if (!b && b !== 0) return '';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    /* ── Dosya listesini yükle ── */
    async function loadFiles() {
      try {
        const res = await fetch('/files');
        const files = await res.json();
        renderFiles(files);
      } catch (e) {
        /* Backend yoksa grid boş kalır */
        updateCount(0);
      }
    }

    function renderFiles(files) {
      const grid = document.getElementById('fileGrid');
      if (!files.length) {
        grid.innerHTML = `<div class="empty-state">
          <img src="/icons/folder.png"></img>
          <p>Henüz dosya yok</p>
        </div>`;
        return;
      }
      grid.innerHTML = files.map(f => {
        const name = typeof f === 'string' ? f : f.name;
        const size = typeof f === 'object' && f.size ? fmtSize(f.size) : '';
        const label = getLabel(name);
        return `<a class="file-card" href="/download/${encodeURIComponent(name)}" download="${name}">
          <div class="file-thumb"><img src="/icon/${label}.png"></img></div>
          <span class="file-name">${name}</span>
          ${size ? `<span class="file-size">${size}</span>` : ''}
        </a>`;
      }).join('');
    }

    /* ── Upload ── */
    document.getElementById('fileInput').addEventListener('change', function() {
      if (this.files.length) uploadAll(this.files);
    });

    async function uploadAll(files) {
      for (const file of files) await uploadChunked(file);
      loadFiles();
    }

    async function uploadChunked(file) {
      const wrap  = document.getElementById('progressWrap');
      const fill  = document.getElementById('progressFill');
      const pct   = document.getElementById('progressPct');
      const pname = document.getElementById('progressName');

      wrap.classList.add('visible');
      pname.textContent = file.name;
      fill.style.width = '0%';
      pct.textContent = '0%';

      const chunkSize = 512 * 1024;
      const total = Math.ceil(file.size / chunkSize);

      for (let i = 0; i < total; i++) {
        const chunk = file.slice(i * chunkSize, (i + 1) * chunkSize);
        const fd = new FormData();
        fd.append('file', chunk);
        fd.append('filename', file.name);
        fd.append('chunk_index', i);
        fd.append('total_chunks', total);
        try { await fetch('/upload', { method: 'POST', body: fd }); } catch (_) {}
        const p = Math.round((i + 1) / total * 100);
        fill.style.width = p + '%';
        pct.textContent = p + '%';
      }

      setTimeout(() => {
        wrap.classList.remove('visible');
        fill.style.width = '0%';
      }, 1000);
    }

    /* ── Drag & Drop ── */
    const dz = document.getElementById('dropZone');
    dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', ()  => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('drag-over');
      if (e.dataTransfer.files.length) uploadAll(e.dataTransfer.files);
    });

    /* ── Başlangıç ── */
    loadFiles();
  </script>
</body>
</html>
